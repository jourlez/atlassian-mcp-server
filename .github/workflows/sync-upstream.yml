name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  sync:
    name: Sync from atlassian/atlassian-mcp-server
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/atlassian/atlassian-mcp-server.git
          git fetch upstream main

      - name: Check for new upstream commits
        id: diff
        run: |
          COUNT=$(git rev-list --count HEAD..upstream/main)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Create sync branch and PR
        if: steps.diff.outputs.count != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="upstream-sync/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit --strategy-option=ours || {
            # If merge has conflicts, commit the conflict markers so the PR is reviewable
            git add -A
            git commit -m "chore: upstream sync $(date +%Y-%m-%d) [has conflicts — review required]"
          }
          git push --force origin "$BRANCH"

          COMMITS=$(git log --oneline HEAD~${{ steps.diff.outputs.count }}..HEAD)
          TITLE="chore: upstream sync $(date +%Y-%m-%d) (${{ steps.diff.outputs.count }} commits)"
          BODY="## Upstream changes from [atlassian/atlassian-mcp-server](https://github.com/atlassian/atlassian-mcp-server)

          **${{ steps.diff.outputs.count }} new commit(s):**

          \`\`\`
          $COMMITS
          \`\`\`

          Review the diff carefully before merging — upstream changes may conflict with local proxy customisations in \`proxy/index.mjs\` and \`scripts/manage-accounts.mjs\`."

          # Use REST API instead of GraphQL (gh pr create) to avoid integration permission restrictions
          jq -n \
            --arg title "$TITLE" \
            --arg head "$BRANCH" \
            --arg body "$BODY" \
            '{title: $title, head: $head, base: "main", body: $body}' | \
          curl -f -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/pulls" \
            --data @-
